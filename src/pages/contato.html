<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página de contato com formulário fictício de mensagem.">
    <title>Contato</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="icon" href="../favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Formulário fictício de contato (somente a estrutura HTML, sem funcionamento real). -->
    <nav>
        <ul class="navbar">
            <li><a href="../index.html" class="nav-links">home</a></li>
            <li><a href="portfolio.html" class="nav-links">portfolio</a></li>
            <li><a href="servicos.html" class="nav-links">serviços</a></li>
            <li><a href="sobre.html" class="nav-links">sobre</a></li>
            <li><a href="contato.html" class="nav-links">contato</a></li>
        </ul>
    </nav>

    <main class="container">
        <section class="content-block">
            <h1>Contato</h1>
            <p>
                Envie uma mensagem pelo formulário abaixo. Este formulário é fictício e foi criado apenas para a
                atividade prática de HTML e CSS.
            </p>
        </section>

        <section class="contato">
            <form action="#" method="post">
                <label for="name">Nome:</label>
                <input type="text" id="name" name="name" placeholder="Seu nome" required>

                <label for="email">E-mail:</label>
                <input type="text" id="email" name="email" placeholder="seuemail@exemplo.com" required>

                <label for="msgbox">Mensagem:</label>
                <textarea name="message" id="msgbox" placeholder="Digite sua mensagem" required></textarea>

                <input type="submit" value="Enviar">
            </form>
        </section>
    </main>
    
</body>
</html>
